<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>10Cricket</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#000;
font-family:Arial;
color:#fff;
padding-bottom:120px;
}

/* Header */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:linear-gradient(90deg,#001a00,#00aa00,#001a00);
}

.logo img{
height:55px;
filter:drop-shadow(0 0 8px #00ff00);
}

/* Buttons */
.btns a{
padding:8px 12px;
margin-left:6px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
font-size:14px;
}
.signup{background:#111;color:#fff}
.login{background:#9cff00;color:#000}

.wrap{padding:10px}

/* Banner */
.banner{
margin-bottom:12px;
border:2px solid #66ff00;
border-radius:14px;
overflow:hidden;
box-shadow:0 0 10px #00ff00;
}
.banner img{
width:100%;
display:block;
cursor:pointer;
}

/* Small Banner */
.small{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
height:180px; /* এখানে height কমানো হয়েছে */
border:2px solid #66ff00;
border-radius:14px;
overflow:hidden;
background:#111;
box-shadow:0 0 8px #00ff00;
}
.card img{
width:100%;
height:100%;
object-fit:cover;
cursor:pointer;
}

/* Game Popup */
#gameBox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
z-index:999;
}
#gameBox iframe{
width:100%;
height:100%;
border:none;
}
.closeBtn{
position:absolute;
top:10px;
right:10px;
background:red;
color:#fff;
padding:8px 12px;
border:none;
font-weight:bold;
}

/* Bottom Menu */
.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
padding:16px;
background:#001a00;
border-top:2px solid #66ff00;
}
.bottom a{
color:#fff;
font-size:22px;
text-decoration:none;
}
.home{color:#9cff00}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.png">
</div>

<div class="btns">
<a href="#" class="signup">Sign Up</a>
<a href="#" class="login">Login</a>
</div>
</header>

<div class="wrap">

<!-- Top Banner -->
<div class="banner"><img src="banner1.png" onclick="openGame('https://example.com')"></div>
<div class="banner"><img src="banner2.png" onclick="openGame('https://example.com')"></div>
<div class="banner"><img src="banner3.png" onclick="openGame('https://example.com')"></div>

<div class="small">

<!-- 1–30 (আপনার দেওয়া অংশসহ) -->

<div class="card"><img src="small2.png" onclick="openGame('https://example.com')"></div>

<div class="card"><img src="small7.png" onclick="openGame('https://example.com')"></div>
<div class="card"><img src="small8.png" onclick="openGame('https://example.com')"></div>
<div class="card"><img src="small9.png" onclick="openGame('https://example.com')"></div>
<div class="card"><img src="small10.png" onclick="openGame('https://example.com')"></div>

<div class="card"><img src="small11.png" onclick="openGame('https://example.com')"></div>
<div class="card"><img src="small12.png" onclick="openGame('https://example.com')"></div>
<div class="card"><img src="small13.png" onclick="openGame('https://example.com')"></div>
<div class="card"><img src="small14.png" onclick="openGame('https://example.com')"></div>
<div class="card"><img src="small15.png" onclick="openGame('https://example.com')"></div>
<div class="card"><img src="small16.png" onclick="openGame('https://example.com')"></div>

</div>

<!-- Bottom Banner -->
<div class="banner">
<img src="bigbottom.png" onclick="openGame('https://example.com')">
</div>

</div>

<!-- Game Popup -->
<div id="gameBox">
<button class="closeBtn" onclick="closeGame()">X</button>
<iframe id="gameFrame"></iframe>
</div>

<script>
function openGame(link){
document.getElementById("gameBox").style.display="block";
document.getElementById("gameFrame").src=link;
}
function closeGame(){
document.getElementById("gameBox").style.display="none";
document.getElementById("gameFrame").src="";
}
</script>

<div class="bottom">
<a href="#">Sports</a>
<a href="#" class="home">Home</a>
<a href="#">Account</a>
</div>

</body>
</html>
