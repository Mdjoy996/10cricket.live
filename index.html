<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>10Cricket</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#000;
font-family:Arial;
color:#fff;
padding-bottom:120px;
}

/* USER BAR */
#userBar{
display:none;
margin:10px;
padding:10px;
background:#111;
border-radius:10px;
}

/* SLIDER */
.slider-box{
margin-bottom:12px;
border-radius:14px;
overflow:hidden;
}

.slider-img{
width:100%;
height:55px;
object-fit:cover;
display:block;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:linear-gradient(90deg,#001a00,#00aa00,#001a00);
}

.logo img{
height:55px;
}

/* BUTTONS */
.btns a{
padding:8px 12px;
margin-left:6px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
font-size:14px;
}
.signup{background:#111;color:#fff}
.login{background:#9cff00;color:#000}

/* BANNERS */
.wrap{padding:6px}

.banner{
margin-bottom:10px;
border:2px solid #66ff00;
border-radius:14px;
overflow:hidden;
box-shadow:0 0 10px #00ff00;
}

.banner img{
width:100%;
height:120px;
object-fit:cover;
display:block;
}

/* SMALL GRID */
.small{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
height:140px;
border:2px solid #66ff00;
border-radius:14px;
overflow:hidden;
background:#111;
box-shadow:0 0 8px #00ff00;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* GAME POPUP */
#gameBox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
z-index:999;
}

#gameFrame{
width:100%;
height:100%;
border:none;
}

.closeBtn{
position:absolute;
top:10px;
right:10px;
background:red;
color:#fff;
padding:8px 12px;
border:none;
}

/* BOTTOM NAV */
.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
padding:16px;
background:#001a00;
border-top:2px solid #66ff00;
}

.bottom a{
color:#fff;
font-size:22px;
text-decoration:none;
}
.home{color:#9cff00}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.png">
</div>

<div class="btns">
<a href="#" class="signup">Sign Up</a>

<!-- BOTTOM NAV -->

<a href="#">Sports</a>

<a href="#">Account</a>
</div>

<script>
function openGame(link){
document.getElementById("gameBox").style.display="block";
document.getElementById("gameFrame").src=link;
}

function closeGame(){
document.getElementById("gameBox").style.display="none";
document.getElementById("gameFrame").src="";
}

/* SLIDER FIXED */
let slides = ["slider.png","slider1.png","slider2.png","slider3.png"];
let i = 0;

setInterval(()=>{
i = (i+1)%slides.length;
let img = document.querySelector(".slider-img");
if(img) img.src = slides[i];
},2500);

/* USER SYSTEM */
function updateUserUI(){
let currentUser = localStorage.getItem("currentUser");
let userBar = document.getElementById("userBar");

if(!userBar) return;

if(!currentUser){
userBar.style.display="none";
return;
}

userBar.style.display="block";

document.getElementById("userName").innerText=currentUser;

let users = JSON.parse(localStorage.getItem("users")) || [];
let user = users.find(u => u.username === currentUser);

if(user){
document.getElementById("balance").innerText=user.balance || 0;
document.getElementById("exposure").innerText=user.exposure || 0;
}
}

window.onload = updateUserUI;
</script>
