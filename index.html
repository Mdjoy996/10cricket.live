<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>10Cricket Final</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#000;
font-family:Arial,sans-serif;
color:#fff;
padding-bottom:120px;
}

/* Header */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:linear-gradient(90deg,#001a00,#00aa00,#001a00);
position:sticky;
top:0;
z-index:99;
}

/* SVG Logo */
.logo svg{
height:50px;
filter: drop-shadow(0 0 6px #00ff00);
}

/* Buttons */
.btns{
display:flex;
align-items:center;
}

.btns a{
text-decoration:none;
padding:8px 12px;
margin-left:6px;
border-radius:8px;
font-weight:bold;
font-size:14px;
}

.signup{background:#111;color:#fff}
.login{background:#9cff00;color:#000}

.wrap{padding:10px}

/* Banner */
.banner{
margin-bottom:12px;
border:2px solid #66ff00;
border-radius:14px;
overflow:hidden;
box-shadow:0 0 10px #00ff00;
}
.banner img{
width:100%;
display:block;
}

/* Small Banner */
.small{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
height:190px;
border:2px solid #66ff00;
border-radius:14px;
overflow:hidden;
background:#111;
box-shadow:0 0 8px #00ff00;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

/* Bottom */
.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:linear-gradient(90deg,#001a00,#00aa00,#001a00);
display:flex;
justify-content:space-around;
padding:16px 0;
border-top:2px solid #66ff00;
box-shadow:0 -2px 12px #00ff00;
}

.bottom a{
color:#fff;
text-decoration:none;
font-size:24px;
font-weight:bold;
padding:10px 16px;
border-radius:14px;
}

.home{
background:#9cff00;
color:#000;
box-shadow:0 0 10px #9cff00;
}
</style>
</head>
