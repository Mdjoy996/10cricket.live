<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>10Cricket Final</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#000;
font-family:Arial,sans-serif;
color:#fff;
padding-bottom:120px;
}

/* Header */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:linear-gradient(90deg,#001a00,#00aa00,#001a00);
position:sticky;
top:0;
z-index:99;
}

/* 🔥 NEW LOGO STYLE */
.logo{
display:flex;
align-items:center;
gap:6px;
font-weight:900;
font-style:italic;
}

.ten{
font-size:42px;
color:#7CFF00;
}

.cricket{
font-size:36px;
color:#fff;
}

/* Cricket Ball */
.ball{
width:28px;
height:28px;
border-radius:50%;
background:red;
position:relative;
box-shadow:0 0 8px red;
}
.ball:after{
content:"";
position:absolute;
left:50%;
top:0;
width:2px;
height:100%;
background:#fff;
transform:translateX(-50%);
}

/* LIVE Tag */
.live{
background:#7CFF00;
color:#000;
font-size:14px;
padding:3px 10px;
border-radius:4px;
margin-left:6px;
font-weight:bold;
}

.btns a{
text-decoration:none;
padding:10px 14px;
margin-left:8px;
border-radius:10px;
font-weight:bold;
}
.signup{background:#111;color:#fff}
.login{background:#9cff00;color:#000}

.wrap{padding:10px}

/* Banner */
.banner{
margin-bottom:12px;
border:2px solid #66ff00;
border-radius:14px;
overflow:hidden;
box-shadow:0 0 10px #00ff00;
}
.banner img{
width:100%;
display:block;
}

/* Small Banner */
.small{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.card{
height:240px;
border:2px solid #66ff00;
border-radius:14px;
overflow:hidden;
background:#111;
box-shadow:0 0 8px #00ff00;
}
.card img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

/* Bottom Menu */
.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:linear-gradient(90deg,#001a00,#00aa00,#001a00);
display:flex;
justify-content:space-around;
padding:16px 0;
border-top:2px solid #66ff00;
box-shadow:0 -2px 12px #00ff00;
}

.bottom a{
color:#fff;
text-decoration:none;
font-size:28px;
font-weight:bold;
padding:12px 18px;
border-radius:14px;
}

.home{
background:#9cff00;
color:#000;
box-shadow:0 0 10px #9cff00;
}
</style>
</head>

<body>

<header>
<div class="logo">
<span class="ten">10</span>
<span class="cricket">Cricket</span>
<div class="ball"></div>
<span class="live">LIVE</span>
</div>

<div class="btns">
<a href="signup.html" class="signup">Sign Up</a>
<a href="login.html" class="login">Login</a>
</div>
</header>

<div class="wrap">

<div class="banner"><img src="banner1.png"></div>
<div class="banner"><img src="banner2.png"></div>
<div class="banner"><img src="banner3.png"></div>
<div class="banner"><img src="banner4.png"></div>

<div class="small">
<div class="card"><img src="small1.png"></div>
<div class="card"><img src="small2.png"></div>
<div class="card"><img src="small3.png"></div>
<div class="card"><img src="small4.png"></div>
</div>

<div class="banner"><img src="bigbottom.png"></div>

</div>

<div class="bottom">
<a href="#">Sports</a>
<a href="#" class="home">Home</a>
<a href="#">Account</a>
</div>

</body>
</html>
