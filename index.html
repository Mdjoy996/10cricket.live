<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>10Cricket</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#000;
font-family:Arial;
color:#fff;
padding-bottom:120px;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:linear-gradient(90deg,#001a00,#00aa00,#001a00);
}

/* LOGO + BET */
.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:55px;
}

#betText{
display:none;
font-size:22px;
font-weight:bold;
color:#9cff00;
}

/* BUTTONS */
.btns a{
padding:8px 12px;
margin-left:6px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
font-size:14px;
}
.signup{background:#111;color:#fff}
.login{background:#9cff00;color:#000}

/* USER BAR */
#userBar{
display:none;
margin:10px;
padding:10px;
background:#111;
border-radius:10px;
}

/* SLIDER */
.slider-box{
margin-bottom:12px;
border-radius:14px;
overflow:hidden;
}

.slider-img{
width:100%;
height:55px;
object-fit:cover;
display:block;
}

/* BANNER */
.wrap{padding:6px}

.banner{
margin-bottom:10px;
border:2px solid #66ff00;
border-radius:14px;
overflow:hidden;
box-shadow:0 0 10px #00ff00;
}

.banner img{
width:100%;
height:120px;
object-fit:cover;
display:block;
}

/* SMALL */
.small{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
height:140px;
border:2px solid #66ff00;
border-radius:14px;
overflow:hidden;
background:#111;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* GAME POPUP */
#gameBox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
z-index:999;
}

#gameFrame{
width:100%;
height:100%;
border:none;
}

.closeBtn{
position:absolute;
top:10px;
right:10px;
background:red;
color:#fff;
padding:8px 12px;
border:none;
}

/* BOTTOM NAV */
.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
padding:16px;
background:#001a00;
border-top:2px solid #66ff00;
}

.bottom a{
color:#fff;
font-size:22px;
text-decoration:none;
}
.home{color:#9cff00}
</style>
</head>

<body>

<!-- HEADER -->
<header>

<div class="logo">
<img src="logo.png" id="siteLogo">
<span id="betText">BET</span>
</div>

<div class="btns">
<a href="#" class="signup">Sign Up</a>
<a href="login.html" class="login">Login</a>
</div>

</header>

<!-- USER BAR -->
<div id="userBar">
User: <span id="userName"></span><br>
Balance: <span id="balance"></span><br>
Exposure: <span id="exposure"></span>
</div>

<div class="wrap">

<!-- SLIDER -->
<div class="slider-box">
<img class="slider-img" src="slider.png">
</div>

<!-- BANNERS -->
<div class="banner"><img src="banner1.png" onclick="openGame('https://example.com')"></div>
<div class="banner"><img src="banner2.png" onclick="openGame('https://example.com')"></div>
<div class="banner"><img src="banner3.png" onclick="openGame('https://example.com')"></div>
<div class="banner"><img src="banner4.png" onclick="openGame('https://example.com')"></div>

<!-- SMALL -->
<div class="small">
<div class="card"><img src="small1.png" onclick="openGame('https://example.com')"></div>
<div class="card"><img src="small2.png" onclick="openGame('https://example.com')"></div>
<div class="card"><img src="small3.png" onclick="openGame('https://example.com')"></div>
<div class="card"><img src="small4.png" onclick="openGame('https://example.com')"></div>
</div>

</div>

<!-- BIG BANNER -->
<div class="banner">
<img src="bigbottom.png" style="height:80px;width:100%;object-fit:cover;" onclick="openGame('https://example.com')">
</div>

<!-- FOOTER -->
<footer style="background:#0b0b0b;color:#fff;padding:25px 15px;text-align:center;margin-top:40px;">
<p>© 2026 10cricket.live | All Rights Reserved</p>
</footer>

<!-- POPUP -->
<div id="gameBox">
<button class="closeBtn" onclick="closeGame()">X</button>
<iframe id="gameFrame"></iframe>
</div>

<!-- BOTTOM NAV -->
<div class="bottom">
<a href="#">Sports</a>
<a href="#" class="home">Home</a>
<a href="#">Account</a>
</div>

<script>

/* GAME */
function openGame(link){
document.getElementById("gameBox").style.display="block";
document.getElementById("gameFrame").src=link;
}
function closeGame(){
document.getElementById("gameBox").style.display="none";
document.getElementById("gameFrame").src="";
}

/* SLIDER */
let slides=["slider.png","slider1.png","slider2.png","slider3.png"];
let i=0;
setInterval(()=>{
i=(i+1)%slides.length;
document.querySelector(".slider-img").src=slides[i];
},2500);

/* USER + BET SWITCH */
function updateUI(){

let user=localStorage.getItem("currentUser");

let logo=document.getElementById("siteLogo");
let bet=document.getElementById("betText");
let bar=document.getElementById("userBar");

if(!user){
if(logo) logo.style.display="block";
if(bet) bet.style.display="none";
if(bar) bar.style.display="none";
return;
}

if(logo) logo.style.display="none";
if(bet) bet.style.display="inline-block";

bar.style.display="block";

document.getElementById("userName").innerText=user;

let users=JSON.parse(localStorage.getItem("users"))||[];
let u=users.find(x=>x.username===user);

if(u){
document.getElementById("balance").innerText=u.balance||0;
document.getElementById("exposure").innerText=u.exposure||0;
}
}

window.onload=updateUI;

</script>

</body>
</html>
