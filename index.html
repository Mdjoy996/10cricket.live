<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>10Cricket</title>

<style>

body{
background:#000;
font-family:Arial;
color:#fff;
margin:0;
padding-bottom:150px;
}

/* ================= BANNER + CARD ================= */
.banner, .card{
position:relative;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.banner:hover img,
.card:hover img{
transform:scale(1.05);
}

.banner::after,
.card::after{
content:"▶ Play";
position:absolute;
bottom:8px;
right:8px;
color:#00ff99;
font-size:12px;
font-weight:bold;
background:rgba(0,0,0,0.75);
padding:5px 10px;
border-radius:8px;
border:1px solid #00ff99;
z-index:20;
pointer-events:none;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px 10px;
background:linear-gradient(90deg,#001a00,#00aa00,#001a00);
}

.logo img{height:55px}

.btns a{
padding:8px 12px;
margin-left:6px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
font-size:14px;
}
.signup{background:#111;color:#fff}
.login{background:#9cff00;color:#000}

/* BET BAR */
#betBar{
display:none;
padding:4px 10px;
background:linear-gradient(90deg,#002b00,#006400,#002b00);
}

/* SLIDER */
.slider-box{
margin:0;
overflow:hidden;
}

.slider-img{
width:100%;
height:65px;
object-fit:cover;
}

/* BANNER */
.banner{
border:2px solid rgba(0,255,153,0.7);
border-radius:10px;
}

.banner img{
width:100%;
height:120px;
object-fit:cover;
}

/* SMALL GRID */
.small{
display:grid;
grid-template-columns:1fr 1fr;
position:relative;
}

.small::before{
content:"";
position:absolute;
top:0;
left:50%;
width:2px;
height:100%;
background:rgba(0,255,153,0.7);
z-index:5;
}

.card{
height:150px;
border-top:2px solid rgba(0,255,153,0.6);
border-bottom:2px solid rgba(0,255,153,0.6);
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* GAME */
#gameBox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
z-index:999;
}

#gameFrame{
width:100%;
height:100%;
border:none;
}

.closeBtn{
position:absolute;
top:10px;
right:10px;
background:red;
color:#fff;
padding:8px 12px;
border:none;
}

/* BOTTOM */
.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
padding:16px;
background:#001a00;
border-top:2px solid #66ff00;
z-index:50;
}

.bottom a{
color:#fff;
text-decoration:none;
font-size:18px;
text-align:center;
}

/* logout inside account */
#bottomLogout{
display:none;
color:#ff4d4d;
font-size:12px;
}

.home{color:#9cff00}

</style>
</head>

<body>

<header>
<div class="logo" id="logo">
<img src="logo.png">
</div>

<div class="btns" id="authBtns">
<a href="#" class="signup">Sign Up</a>
<a href="login.html" class="login">Login</a>
<a href="#" id="logoutBtn" class="login" style="display:none;" onclick="logout()">Logout</a>
</div>
</header>

<div id="betBar"></div>

<div class="wrap">

<div class="slider-box">
<img class="slider-img" src="slider.png">
</div>

<!-- BANNERS -->
<div class="banner" onclick="openGame('https://example.com')"><img src="banner1.png"></div>
<div class="banner" onclick="openGame('https://example.com')"><img src="banner2.png"></div>
<div class="banner" onclick="openGame('https://example.com')"><img src="banner3.png"></div>
<div class="banner" onclick="openGame('https://example.com')"><img src="banner4.png"></div>

<!-- SMALL -->
<div class="small">
<script>
for(let i=1;i<=30;i++){
document.write(`<div class="card" onclick="openGame('https://example.com')">
<img src="small${i}.png">
</div>`);
}
</script>
</div>

<div class="banner" onclick="openGame('https://example.com')">
<img src="bigbottom.png" style="height:80px;">
</div>

</div>

<footer>
10cricket.live<br>
© 2026
</footer>

<div id="gameBox">
<button class="closeBtn" onclick="closeGame()">X</button>
<iframe id="gameFrame"></iframe>
</div>

<!-- BOTTOM -->
<div class="bottom">
<a href="#">Sports</a>
<a href="#" class="home">Home</a>

<a href="#">
Account
<div id="bottomLogout" onclick="logout()">Logout</div>
</a>

</div>

<script>

function openGame(l){
document.getElementById("gameBox").style.display="block";
document.getElementById("gameFrame").src=l;
}

function closeGame(){
document.getElementById("gameBox").style.display="none";
document.getElementById("gameFrame").src="";
}

/* LOGIN */
function updateUI(){
let user = localStorage.getItem("currentUser");

document.getElementById("logo").style.display = user ? "none" : "block";
document.getElementById("authBtns").style.display = user ? "none" : "block";
document.getElementById("logoutBtn").style.display = user ? "inline-block" : "none";
document.getElementById("bottomLogout").style.display = user ? "block" : "none";
}

function logout(){
localStorage.removeItem("currentUser");
location.reload();
}

window.onload = updateUI;

/* SLIDER */
let imgs = ["slider.png","slider1.png","slider2.png","slider3.png"];
let i = 0;

setInterval(()=>{
i = (i + 1) % imgs.length;
document.querySelector(".slider-img").src = imgs[i] + "?v=" + Date.now();
},2500);

</script>

</body>
</html>
