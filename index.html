<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>10Cricket</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#000;
font-family:Arial;
color:#fff;
padding-bottom:120px;
}

/* HEADER (NO LOGO) */
header{
display:flex;
justify-content:flex-end;
align-items:center;
padding:8px 10px;
background:linear-gradient(90deg,#001a00,#00aa00,#001a00);
}

/* AUTH */
.btns a{
padding:8px 12px;
margin-left:6px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
font-size:14px;
}
.signup{background:#111;color:#fff}
.login{background:#9cff00;color:#000}

/* BET BAR */
#betBar{
display:none;
padding:10px;
background:#002b00;
}

.betRow{
display:flex;
gap:10px;
align-items:center;
}

.betBox{
background:#333;
padding:10px 15px;
border-radius:10px;
}

.betMain{
flex:1;
background:#222;
padding:10px;
border-radius:10px;
}

/* SLIDER */
.slider-box{margin-bottom:12px;overflow:hidden;border-radius:14px}
.slider-img{width:100%;height:55px;object-fit:cover}

/* BANNER */
.wrap{padding:6px}

.banner{
margin-bottom:10px;
border:2px solid #66ff00;
border-radius:14px;
overflow:hidden;
box-shadow:0 0 10px #00ff00;
}

.banner img{
width:100%;
height:120px;
object-fit:cover;
}

/* SMALL */
.small{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
height:140px;
border:2px solid #66ff00;
border-radius:14px;
overflow:hidden;
background:#111;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* POPUP */
#gameBox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000;
display:none;
z-index:999;
}

#gameFrame{width:100%;height:100%;border:none}

.closeBtn{
position:absolute;
top:10px;right:10px;
background:red;
color:#fff;
padding:8px 12px;
border:none;
}

/* BOTTOM */
.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
padding:16px;
background:#001a00;
border-top:2px solid #66ff00;
}

.bottom a{
color:#fff;
font-size:22px;
text-decoration:none;
}
.home{color:#9cff00}
</style>
</head>

<body>

<!-- HEADER (NO LOGO) -->
<header>

<div class="btns" id="authBtns">
<a href="#" class="signup">Sign Up</a>
<a href="login.html" class="login">Login</a>
<a href="#" id="logoutBtn" class="login" style="display:none;" onclick="logout()">Logout</a>
</div>

</header>

<!-- BET BAR -->
<div id="betBar">

<div class="betRow">

<div class="betBox">💰 Bets</div>

<div class="betMain">
Main <span id="balanceVal">0.00</span>
&nbsp;&nbsp;
Exposure <span id="exposureVal">0.00</span>
</div>

<div class="betBox" onclick="refreshBalance()">🔄</div>
<div class="betBox">⚙</div>

</div>

</div>

<!-- CONTENT -->
<div class="wrap">

<div class="slider-box">
<img class="slider-img" src="slider.png">
</div>

<div class="banner"><img src="banner1.png"></div>
<div class="banner"><img src="banner2.png"></div>
<div class="banner"><img src="banner3.png"></div>
<div class="banner"><img src="banner4.png"></div>

<div class="small">

<div class="card"><img src="small1.png"></div>
<div class="card"><img src="small2.png"></div>
<div class="card"><img src="small3.png"></div>
<div class="card"><img src="small4.png"></div>
<div class="card"><img src="small5.png"></div>
<div class="card"><img src="small6.png"></div>
<div class="card"><img src="small7.png"></div>
<div class="card"><img src="small8.png"></div>
<div class="card"><img src="small9.png"></div>
<div class="card"><img src="small10.png"></div>

<div class="card"><img src="small1.png"></div>
<div class="card"><img src="small2.png"></div>
<div class="card"><img src="small3.png"></div>
<div class="card"><img src="small4.png"></div>
<div class="card"><img src="small5.png"></div>
<div class="card"><img src="small6.png"></div>
<div class="card"><img src="small7.png"></div>
<div class="card"><img src="small8.png"></div>
<div class="card"><img src="small9.png"></div>
<div class="card"><img src="small10.png"></div>

<div class="card"><img src="small11.png"></div>
<div class="card"><img src="small12.png"></div>
<div class="card"><img src="small13.png"></div>
<div class="card"><img src="small14.png"></div>
<div class="card"><img src="small15.png"></div>
<div class="card"><img src="small16.png"></div>
<div class="card"><img src="small17.png"></div>
<div class="card"><img src="small18.png"></div>
<div class="card"><img src="small19.png"></div>
<div class="card"><img src="small20.png"></div>

</div>
  
<div class="banner">
<img src="bigbottom.png" style="height:80px;width:100%;object-fit:cover;">
</div>

<!-- FOOTER -->
<footer style="background:#0b0b0b;color:#fff;padding:25px;text-align:center;">
© 2026 10cricket.live
</footer>

<!-- GAME -->
<div id="gameBox">
<button class="closeBtn" onclick="closeGame()">X</button>
<iframe id="gameFrame"></iframe>
</div>

<!-- BOTTOM -->
<div class="bottom">
<a href="#">Sports</a>
<a href="#" class="home">Home</a>
<a href="#">Account</a>
</div>

<script>

function openGame(l){
document.getElementById("gameBox").style.display="block";
document.getElementById("gameFrame").src=l;
}

function closeGame(){
document.getElementById("gameBox").style.display="none";
document.getElementById("gameFrame").src="";
}

/* UI */
function updateUI(){

let user = localStorage.getItem("currentUser");

let auth = document.getElementById("authBtns");
let logout = document.getElementById("logoutBtn");
let betBar = document.getElementById("betBar");

if(!user){
auth.style.display="block";
logout.style.display="none";
betBar.style.display="none";
return;
}

auth.style.display="none";
logout.style.display="inline-block";
betBar.style.display="block";

document.getElementById("balanceVal").innerText="0.00";
document.getElementById("exposureVal").innerText="0.00";
}

function logout(){
localStorage.removeItem("currentUser");
location.reload();
}

function refreshBalance(){
alert("Updated 🔄");
}

window.onload=updateUI;
  
let imgs = ["slider.png","slider1.png","slider2.png","slider3.png"];

let i = 0;

setInterval(() => {
  i = (i + 1) % imgs.length;
  document.querySelector(".slider-img").src = imgs[i];
}, 2500);
  
</script>

</body>
</html>
