<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10Cricket Live</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#e8e8e8;
padding-bottom:75px;
}

/* HEADER */
header{
background:#84a900;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:32px;
font-weight:bold;
color:#fff;
}

.buttons a{
text-decoration:none;
padding:12px 20px;
border-radius:8px;
margin-left:8px;
font-size:22px;
font-weight:bold;
color:#fff;
}

.signup{background:#555;}
.login{background:#e00000;}

/* BANNER */
.game-card{
margin:6px;
background:#000;
border:3px solid #84a900;
border-radius:4px;
overflow:hidden;
position:relative;
cursor:pointer;
}

.game-card img{
width:100%;
display:block;
height:auto;
}

.label{
position:absolute;
left:0;
bottom:0;
background:rgba(0,0,0,0.7);
padding:8px 14px;
font-size:26px;
font-weight:bold;
color:#fff;
}

.play{
position:absolute;
right:0;
bottom:0;
background:#84a900;
padding:8px 18px;
font-size:24px;
font-weight:bold;
color:#fff;
}

/* BOTTOM MENU */
.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#000;
display:flex;
justify-content:space-around;
padding:10px 0;
}

.bottom a{
text-decoration:none;
color:#fff;
font-size:20px;
text-align:center;
}

.bottom .active{
background:#84a900;
padding:6px 18px;
border-radius:20px;
}
</style>
</head>

<body>

<header>
<div class="logo">10Cricket</div>

<div class="buttons">
<a href="#" class="signup">Sign Up</a>
<a href="login.html" class="login">Login</a>
</div>
</header>

<!-- SPORTS -->
<div class="game-card" onclick="go('sports.html')">
<img src="https://picsum.photos/700/300?1">
<div class="label">Sports</div>
<div class="play">Play Now</div>
</div>

<!-- SABA -->
<div class="game-card" onclick="go('saba.html')">
<img src="https://picsum.photos/700/300?2">
<div class="label">Saba (SB)</div>
<div class="play">Play Now</div>
</div>

<!-- CASINO -->
<div class="game-card" onclick="go('casino.html')">
<img src="https://picsum.photos/700/300?3">
<div class="label">Sexy Casino</div>
<div class="play">Play Now</div>
</div>

<!-- AVIATOR -->
<div class="game-card" onclick="go('aviator.html')">
<img src="https://picsum.photos/700/300?4">
<div class="label">Aviator</div>
<div class="play">Play Now</div>
</div>

<div class="bottom">
<a href="#" class="active">🏠<br>Home</a>
<a href="#">📊<br>In-Play</a>
<a href="#">⚽<br>Sports</a>
<a href="#">👤<br>Account</a>
</div>

<script>
function go(page){
window.location.href=page;
}
</script>

</body>
</html>
