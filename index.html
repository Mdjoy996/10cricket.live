<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>10Cricket</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#000;
font-family:Arial;
color:#fff;
padding-bottom:120px;
}
.slider-box{
  margin-bottom:12px;
  border:none;
  box-shadow:none;
  border-radius:14px;
  overflow:hidden;
}

.slider-img{
  width:100%;
  height:55px;
  object-fit:cover;
  display:block;
}

/* Header */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:linear-gradient(90deg,#001a00,#00aa00,#001a00);
flex-wrap:wrap;
}

.logo img{
  height:55px;
  width:auto;
  max-width:350px;
  object-fit:contain;
  display:block;
}

/* Buttons */
.btns a{
padding:8px 12px;
margin-left:6px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
font-size:14px;
}
.signup{background:#111;color:#fff}
.login{background:#9cff00;color:#000}

/* USER BAR FIX */
#userBar{
width:100%;
margin-top:10px;
display:none;
font-size:13px;
background:#111;
padding:8px;
border-radius:8px;
}

/* Banner */
.wrap{padding:6px}

.banner{
margin-bottom:10px;
border:2px solid #66ff00;
border-radius:14px;
overflow:hidden;
box-shadow:0 0 10px #00ff00;
}
.banner img{
width:100%;
height:120px;
object-fit:cover;
display:block;
}

/* Small Banner */
.small{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
height:140px;
border:2px solid #66ff00;
border-radius:14px;
overflow:hidden;
background:#111;
box-shadow:0 0 8px #00ff00;
}
.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* Game Popup */
#gameBox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
z-index:999;
}
#gameFrame{
width:100%;
height:100%;
border:none;
}
.closeBtn{
position:absolute;
top:10px;
right:10px;
background:red;
color:#fff;
padding:8px 12px;
border:none;
}

/* Bottom */
.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
padding:16px;
background:#001a00;
border-top:2px solid #66ff00;
}
.bottom a{
color:#fff;
font-size:22px;
text-decoration:none;
}
.home{color:#9cff00}
</style>
</head>

<body>

<!-- GAME POPUP -->
<div id="gameBox">
<button class="closeBtn" onclick="closeGame()">X</button>
<iframe id="gameFrame"></iframe>
</div>

<script>
let imgs = ["slider.png","slider1.png","slider2.png","slider3.png"];
let i = 0;

setInterval(() => {
  i++;
  if(i >= imgs.length){ i = 0; }
  document.querySelector(".slider-img").src = imgs[i];
}, 2000);

function openGame(link){
document.getElementById("gameBox").style.display="block";
document.getElementById("gameFrame").src=link;
}

function closeGame(){
document.getElementById("gameBox").style.display="none";
document.getElementById("gameFrame").src="";
}

// FIXED SAFE SCRIPT
let currentUser = localStorage.getItem("currentUser");

if(currentUser){
document.getElementById("userBar").style.display = "block";
document.getElementById("userName").innerText = currentUser;
loadBalance();
}

function loadBalance(){
let users = JSON.parse(localStorage.getItem("users")) || [];
let user = users.find(u => u.username === currentUser);

if(user){
document.getElementById("balance").innerText = user.balance || 0;
document.getElementById("exposure").innerText = user.exposure || 0;
}
}

function refreshBalance(){
loadBalance();
alert("Balance Updated 🔄");
}

function logout(){
localStorage.removeItem("currentUser");
location.reload();
}
</script>
