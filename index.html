<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10Cricket Live</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#121212;color:#fff;padding-bottom:80px}
header{
background:#84a900;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}
.logo{
font-size:28px;
font-weight:bold;
}
.top a{
text-decoration:none;
padding:10px 16px;
border-radius:8px;
margin-left:6px;
color:#fff;
font-weight:bold;
}
.signup{background:#555}
.login{background:#e00000}

.banner{
margin:8px;
background:#222;
border-radius:8px;
overflow:hidden;
position:relative;
}
.banner img{width:100%;display:block}
.label{
position:absolute;
left:10px;
bottom:10px;
background:#000a;
padding:6px 10px;
border-radius:6px;
font-size:22px;
font-weight:bold;
}
.play{
position:absolute;
right:10px;
bottom:10px;
background:#84a900;
padding:8px 12px;
border-radius:6px;
font-weight:bold;
}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#000;
display:flex;
justify-content:space-around;
padding:10px 0;
}
.bottom a{
color:#fff;
text-decoration:none;
text-align:center;
font-size:16px;
}
.active{color:#84a900}
</style>
</head>
<body>

<header>
<div class="logo">10Cricket</div>
<div class="top">
<a href="#" class="signup">Sign Up</a>
<a href="login.html" class="login">Login</a>
</div>
</header>

<div class="banner">
<a href="sports.html">
<img src="https://picsum.photos/700/300?1">
<div class="label">Sports</div>
<div class="play">Play Now</div>
</a>
</div>

<div class="banner">
<a href="casino.html">
<img src="https://picsum.photos/700/300?2">
<div class="label">Casino</div>
<div class="play">Play Now</div>
</a>
</div>

<div class="banner">
<a href="aviator.html">
<img src="https://picsum.photos/700/300?3">
<div class="label">Aviator</div>
<div class="play">Play Now</div>
</a>
</div>

<div class="bottom">
<a href="#" class="active">🏠<br>Home</a>
<a href="sports.html">⚽<br>Sports</a>
<a href="casino.html">🎰<br>Casino</a>
<a href="account.html">👤<br>Account</a>
</div>

</body>
</html>
