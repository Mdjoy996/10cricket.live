<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10Cricket</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;font-family:Arial,sans-serif;color:#fff;padding-bottom:70px}

.top{
background:#7aa300;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.logo{
font-size:32px;
font-weight:bold;
color:#fff;
}

.btns{
display:flex;
gap:8px;
}

.btns a{
padding:10px 16px;
border-radius:12px;
text-decoration:none;
color:#fff;
font-size:18px;
font-weight:bold;
}

.signup{background:#555}
.login{background:red}

.wrap{padding:10px}

.card{
margin-bottom:12px;
border:3px solid #8cc000;
border-radius:18px;
overflow:hidden;
background:#111;
}

.card img{
width:100%;
display:block;
}

.nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#000;
display:flex;
justify-content:space-around;
padding:10px 0;
border-top:1px solid #333;
}

.nav a{
color:#fff;
text-decoration:none;
font-size:18px;
}
</style>
</head>
<body>

<div class="top">
<div class="logo">10Cricket</div>
<div class="btns">
<a href="#" class="signup">Sign Up</a>
<a href="#" class="login">Login</a>
</div>
</div>

<div class="wrap">
<div class="card"><img src="banner1.png"></div>
<div class="card"><img src="banner1.png"></div>
<div class="card"><img src="banner1.png"></div>
<div class="card"><img src="banner1.png"></div>
</div>

<div class="nav">
<a href="#">Home</a>
<a href="#">Sports</a>
<a href="#">Casino</a>
<a href="#">Account</a>
</div>

</body>
</html>
