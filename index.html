<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>10Cricket</title>

<style>

/* BODY */
body{
background:#000;
font-family:Arial;
color:#fff;
padding-bottom:150px;
}

/* 🔥 BANNER + CARD */
.banner, .card{
position:relative;
overflow:hidden;
cursor:pointer;
}

/* ▶ PLAY LABEL (RIGHT SIDE FIXED) */
.banner::after,
.card::after{
content:"▶ Play";
position:absolute;
bottom:8px;
right:8px;

color:#00ff99;
font-size:12px;
font-weight:bold;

background:rgba(0,0,0,0.75);
padding:5px 10px;
border-radius:8px;
border:1px solid #00ff99;

z-index:10;
pointer-events:none;
box-shadow:0 0 8px rgba(0,255,153,0.4);
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px 10px;
background:linear-gradient(90deg,#001a00,#00aa00,#001a00);
}

.logo img{height:55px}

.btns a{
padding:8px 12px;
margin-left:6px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
font-size:14px;
}
.signup{background:#111;color:#fff}
.login{background:#9cff00;color:#000}

/* BET BAR */
#betBar{
display:none;
padding:4px 10px;
background:linear-gradient(90deg,#002b00,#006400,#002b00);
}

.betRow{
display:flex;
align-items:center;
gap:8px;
background:rgba(0,0,0,0.4);
padding:4px 6px;
border-radius:14px;
}

.betBox{
background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
padding:6px 12px;
border-radius:10px;
font-size:14px;
border:1px solid rgba(0,255,0,0.3);
}

.betMain{
flex:1;
background:linear-gradient(135deg,#111,#222);
padding:4px 10px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

#balanceVal{color:#00ff99;font-weight:bold;}
#exposureVal{color:#ff4d4d;font-weight:bold;}

/* SLIDER */
.slider-box{
margin-bottom:12px;
overflow:hidden;
border-radius:14px;
background:#000;
line-height:0;
}

.slider-img{
width:100%;
height:65px;
object-fit:cover;
display:block;
}

/* WRAP */
.wrap{padding:10px}

/* BANNER */
.banner{
margin:0;
border:2px solid #66ff00;
border-radius:14px;
overflow:hidden;
}

.banner img{
width:100%;
height:120px;
object-fit:cover;
display:block;
cursor:pointer;
}

/* SMALL GRID */
.small{
display:grid;
grid-template-columns:1fr 1fr;
gap:0;
}

.card{
height:140px;
border-radius:6px;
overflow:hidden;
background:#111;

/* 🔥 ONLY TOP & BOTTOM BORDER */
border-top:1px solid #00ff99;
border-bottom:1px solid #00ff99;
border-left:none;
border-right:none;
}

  .card{
position:relative;
}

/* 🔥 middle long line */
.card::before{
content:"";
position:absolute;
top:50%;
left:0;
width:100%;
height:1px;
background:#00ff99;
opacity:0.6;
}
  
.card img{
width:110%;
height:100%;
object-fit:cover;
cursor:pointer;
}

/* GAME */
#gameBox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000;
display:none;
z-index:999;
}

#gameFrame{width:100%;height:100%;border:none}

.closeBtn{
position:absolute;
top:10px;right:10px;
background:red;
color:#fff;
padding:8px 12px;
border:none;
}

/* FOOTER */
footer{
background:#0b0b0b;
color:#fff;
padding:20px;
text-align:center;
font-size:12px;
opacity:0.8;
}

/* BOTTOM MENU */
.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
padding:16px;
background:#001a00;
border-top:2px solid #66ff00;
}

.bottom a{
color:#fff;
font-size:22px;
text-decoration:none;
}
.home{color:#9cff00}

  /* 📱 MOBILE FULL WIDTH BANNER */
@media (max-width:768px){

.wrap{
padding:0;
}

.banner{
margin:0;
border-radius:0;
}

.banner img{
width:100%;
height:130px;
object-fit:cover;
}

.small{
grid-template-columns:1fr 1fr;
}

.card{
height:150px;
}

}
 @media (max-width:768px){
.banner{
border-left:none;
border-right:none;
}
} 
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.png" id="siteLogo">
</div>

<div class="btns" id="authBtns">
<a href="#" class="signup">Sign Up</a>
<a href="login.html" class="login">Login</a>
<a href="#" id="logoutBtn" class="login" style="display:none;" onclick="logout()">Logout</a>
</div>
</header>

<!-- BET BAR -->
<div id="betBar">
<div class="betRow">

<div class="betBox">💰 Bets</div>

<div class="betMain">
<span>Main <span id="balanceVal">0.00</span></span>
<span>Exposure <span id="exposureVal">0.00</span></span>
</div>

<div class="betBox" onclick="refreshBalance()">🔄</div>
<div class="betBox">⚙</div>

</div>
</div>

<div class="wrap">

<div class="slider-box">
<img class="slider-img" src="slider.png">
</div>

<div class="banner"><img src="banner1.png" onclick="openGame('https://example.com')"></div>
<div class="banner"><img src="banner2.png" onclick="openGame('https://example.com')"></div>
<div class="banner"><img src="banner3.png" onclick="openGame('https://example.com')"></div>
<div class="banner"><img src="banner4.png" onclick="openGame('https://example.com')"></div>

<div class="small">
<script>
for(let i=1;i<=30;i++){
document.write('<div class="card"><img src="small'+i+'.png" onclick="openGame(\'https://example.com\')"></div>');
}
</script>
</div>

<div class="banner">
<img src="bigbottom.png" onclick="openGame('https://example.com')" style="height:80px;">
</div>

</div>

<footer>
10cricket.live | Online Sports Entertainment Platform<br>
www.10cricket.live<br>
Privacy Policy | Terms & Conditions | Responsible Gaming<br>
KYC Verified Platform | Secure Transactions<br>
© 2026 All Rights Reserved
</footer>

<div id="gameBox">
<button class="closeBtn" onclick="closeGame()">X</button>
<iframe id="gameFrame"></iframe>
</div>

<div class="bottom">
<a href="#">Sports</a>
<a href="#" class="home">Home</a>
<a href="#">Account</a>
</div>

<script>

function openGame(l){
document.getElementById("gameBox").style.display="block";
document.getElementById("gameFrame").src=l;
}

function closeGame(){
document.getElementById("gameBox").style.display="none";
document.getElementById("gameFrame").src="";
}

function updateUI(){
let user = localStorage.getItem("currentUser");

let logo = document.getElementById("siteLogo");
let auth = document.getElementById("authBtns");
let logout = document.getElementById("logoutBtn");
let betBar = document.getElementById("betBar");

if(!user){
logo.style.display="block";
auth.style.display="block";
logout.style.display="none";
betBar.style.display="none";
}else{
logo.style.display="none";
auth.style.display="none";
logout.style.display="inline-block";
betBar.style.display="block";
}
}

function logout(){
localStorage.removeItem("currentUser");
location.reload();
}

function refreshBalance(){
alert("Updated 🔄");
}

let imgs = ["slider.png","slider1.png","slider2.png","slider3.png"];
let i = 0;

setInterval(()=>{
i = (i+1)%imgs.length;
document.querySelector(".slider-img").src = imgs[i];
},2500);

window.onload=updateUI;

</script>

</body>
</html>
