<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>10Cricket</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#000;
font-family:Arial;
color:#fff;
padding-bottom:120px;
}

header{
display:flex;
justify-content:flex-end;
align-items:center;
padding:8px 10px;
background:linear-gradient(90deg,#001a00,#00aa00,#001a00);
}

.btns a{
padding:8px 12px;
margin-left:6px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
font-size:14px;
}
.signup{background:#111;color:#fff}
.login{background:#9cff00;color:#000}

#betBar{
display:none;
padding:10px;
background:#002b00;
}

.betRow{
display:flex;
gap:10px;
align-items:center;
}

.betBox{
background:#333;
padding:10px 15px;
border-radius:10px;
}

.betMain{
flex:1;
background:#222;
padding:10px;
border-radius:10px;
}

.slider-box{margin-bottom:12px;overflow:hidden;border-radius:14px}
.slider-img{width:100%;height:55px;object-fit:cover}

.wrap{padding:6px}

.banner{
margin-bottom:10px;
border:2px solid #66ff00;
border-radius:14px;
overflow:hidden;
box-shadow:0 0 10px #00ff00;
cursor:pointer;
}

.banner img{
width:100%;
height:120px;
object-fit:cover;
cursor:pointer;
}

.small{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
height:140px;
border:2px solid #66ff00;
border-radius:14px;
overflow:hidden;
background:#111;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
cursor:pointer;
}

#gameBox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000;
display:none;
z-index:999;
}

#gameFrame{width:100%;height:100%;border:none}

.closeBtn{
position:absolute;
top:10px;right:10px;
background:red;
color:#fff;
padding:8px 12px;
border:none;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
padding:16px;
background:#001a00;
border-top:2px solid #66ff00;
}

.bottom a{
color:#fff;
font-size:22px;
text-decoration:none;
}
.home{color:#9cff00}
</style>
</head>

<body>

<script>

function openGame(l){
let box=document.getElementById("gameBox");
let frame=document.getElementById("gameFrame");
if(box && frame){
box.style.display="block";
frame.src=l;
}
}

function closeGame(){
document.getElementById("gameBox").style.display="none";
document.getElementById("gameFrame").src="";
}

function updateUI(){

let user = localStorage.getItem("currentUser");

let auth = document.getElementById("authBtns");
let logout = document.getElementById("logoutBtn");
let betBar = document.getElementById("betBar");

if(!user){
auth.style.display="block";
logout.style.display="none";
betBar.style.display="none";
return;
}

auth.style.display="none";
logout.style.display="inline-block";
betBar.style.display="block";

document.getElementById("balanceVal").innerText="0.00";
document.getElementById("exposureVal").innerText="0.00";
}

function logout(){
localStorage.removeItem("currentUser");
location.reload();
}

function refreshBalance(){
alert("Updated 🔄");
}

let imgs = ["slider.png","slider1.png","slider2.png","slider3.png"];

let i = 0;

setInterval(() => {
  i = (i + 1) % imgs.length;
  let el = document.querySelector(".slider-img");
  if(el) el.src = imgs[i];
}, 2500);

window.onload=updateUI;

</script>
