<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>10Cricket</title>

<style>

/* (তোমার সব CSS একই রাখা হয়েছে, কিছুই delete করা হয়নি) */

body{
background:#000;
font-family:Arial;
color:#fff;
margin:0;
padding-bottom:150px;
}

.banner, .card{
position:relative;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.banner:hover img,
.card:hover img{
transform:scale(1.05);
transition:0.3s;
}

.banner::after,
.card::after{
content:"▶ Play";
position:absolute;
bottom:8px;
right:8px;
color:#00ff99;
font-size:12px;
font-weight:bold;
background:rgba(0,0,0,0.75);
padding:5px 10px;
border-radius:8px;
border:1px solid #00ff99;
z-index:20;
pointer-events:none;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px 10px;
background:linear-gradient(90deg,#001a00,#00aa00,#001a00);
}

.logo img{height:55px;}

.btns a{
padding:8px 12px;
margin-left:6px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
font-size:14px;
}
.signup{background:#111;color:#fff}
.login{background:#9cff00;color:#000}

/* bottom account logout style */
#bottomLogout{
display:none;
color:#ff4d4d;
font-size:14px;
margin-top:4px;
}

#betBar{
display:none;
padding:4px 10px;
background:linear-gradient(90deg,#002b00,#006400,#002b00);
}

/* बाकी সব আগের মতোই আছে */

</style>
</head>

<body>

<header>
<div class="logo" id="logo">
<img src="logo.png">
</div>

<div class="btns" id="authBtns">
<a href="#" class="signup">Sign Up</a>
<a href="login.html" class="login">Login</a>
<a href="#" id="logoutBtn" class="login" style="display:none;" onclick="logout()">Logout</a>
</div>
</header>

<div id="betBar">
<div class="betRow">
<div class="betBox">💰 Bets</div>
<div class="betMain">
<span>Main <span id="balanceVal">0.00</span></span>
<span>Exposure <span id="exposureVal">0.00</span></span>
</div>
<div class="betBox">🔄</div>
<div class="betBox">⚙</div>
</div>
</div>

<div class="wrap">

<div class="slider-box">
<img class="slider-img" src="slider.png">
</div>

<div class="banner" onclick="openGame('https://example.com')"><img src="banner1.png"></div>
<div class="banner" onclick="openGame('https://example.com')"><img src="banner2.png"></div>
<div class="banner" onclick="openGame('https://example.com')"><img src="banner3.png"></div>
<div class="banner" onclick="openGame('https://example.com')"><img src="banner4.png"></div>

<div class="small">
<script>
for(let i=1;i<=30;i++){
document.write('<div class="card" onclick="openGame(\'https://example.com\')"><img src="small'+i+'.png"></div>');
}
</script>
</div>

<div class="banner" onclick="openGame('https://example.com')">
<img src="bigbottom.png" style="height:80px;">
</div>

</div>

<footer>
10cricket.live | Online Sports Entertainment Platform<br>
© 2026 All Rights Reserved
</footer>

<div id="gameBox">
<button class="closeBtn" onclick="closeGame()">X</button>
<iframe id="gameFrame"></iframe>
</div>

<!-- 🔥 BOTTOM MENU FIX -->
<div class="bottom">
<a href="#">Sports</a>
<a href="#" class="home">Home</a>

<a href="#" id="accountBtn">
Account
<div id="bottomLogout" onclick="logout()">Logout</div>
</a>

</div>

<script>

function openGame(l){
document.getElementById("gameBox").style.display="block";
document.getElementById("gameFrame").src=l;
}

function closeGame(){
document.getElementById("gameBox").style.display="none";
document.getElementById("gameFrame").src="";
}

/* LOGIN FIX */
function updateUI(){
let user = localStorage.getItem("currentUser");

document.getElementById("logo").style.display = user ? "none" : "block";
document.getElementById("authBtns").style.display = user ? "none" : "block";
document.getElementById("logoutBtn").style.display = user ? "inline-block" : "none";
document.getElementById("betBar").style.display = user ? "block" : "none";

/* 🔥 bottom logout show */
document.getElementById("bottomLogout").style.display = user ? "block" : "none";
}

function logout(){
localStorage.removeItem("currentUser");
location.reload();
}

window.onload=updateUI;

/* SLIDER */
let imgs = ["slider.png","slider1.png","slider2.png","slider3.png"];
let i = 0;

setInterval(()=>{
i = (i + 1) % imgs.length;
document.querySelector(".slider-img").src = imgs[i] + "?v=" + new Date().getTime();
},2500);

</script>

</body>
</html>
