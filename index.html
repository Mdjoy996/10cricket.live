ভাই বুঝলাম 👍 আপনি Canvas খুঁজে পাচ্ছেন না।
আমি এখন এখানেই `index.html` code দিচ্ছি।

```html id="index10"
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>10Cricket Mega</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#000;color:#fff;padding-bottom:90px}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px;background:linear-gradient(90deg,#001a00,#0a0,#001a00)}
.logo{font-size:36px;font-weight:900;color:#9f0}
.btns a{padding:10px 14px;border-radius:12px;text-decoration:none;margin-left:8px;font-weight:bold}
.signup{background:#9f0;color:#000}
.login{border:2px solid #9f0;color:#fff}
.wrap{padding:8px}
.main img{width:100%;display:block;border-radius:14px;margin-bottom:10px;border:1px solid #5f0}
.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:8px 0}
.tab{background:#111;border:1px solid #5f0;border-radius:12px;padding:12px;text-align:center;font-weight:bold}
.small{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.small img{width:100%;height:90px;object-fit:cover;border-radius:10px;border:1px solid #5f0}
.bottom{position:fixed;bottom:0;left:0;width:100%;display:flex;justify-content:space-around;align-items:center;background:#041004;padding:12px 0;border-top:2px solid #5f0}
.bottom a{color:#fff;text-decoration:none;font-size:22px;font-weight:bold}
.home{background:#9f0;color:#000;padding:14px 24px;border-radius:18px}
</style>
</head>
<body>
