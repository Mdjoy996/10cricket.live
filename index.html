<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
background:#000;
font-family:Arial,sans-serif;
color:#fff;
padding-bottom:130px;
}

/* Header */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:linear-gradient(90deg,#001a00,#00aa00,#001a00);
position:sticky;
top:0;
z-index:999;
}
.logo{
font-size:36px;
font-weight:900;
color:#9cff00;
}
.btns a{
text-decoration:none;
padding:10px 14px;
margin-left:8px;
border-radius:10px;
font-weight:bold;
}
.signup{background:#111;color:#fff;}
.login{background:#9cff00;color:#000;}

/* Main */
.wrap{padding:10px;}

.banner{
margin-bottom:12px;
border:2px solid #66ff00;
border-radius:14px;
overflow:hidden;
box-shadow:0 0 10px #00ff00;
}
.banner img{
width:100%;
display:block;
}

/* 50 Small Banner */
.small{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}
.card{
height:240px;
border:2px solid #66ff00;
border-radius:14px;
overflow:hidden;
background:#111;
box-shadow:0 0 8px #00ff00;
}
.card img{
width:100%;
height:50%;
object-fit:cover;
display:block;
}

/* Bottom Menu */
.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:linear-gradient(90deg,#001a00,#00aa00,#001a00);
display:flex;
justify-content:space-around;
padding:16px 0;
border-top:2px solid #66ff00;
box-shadow:0 -2px 12px #00ff00;
}
.bottom a{
color:#fff;
text-decoration:none;
font-size:28px;
font-weight:bold;
padding:12px 18px;
border-radius:14px;
}
.home{
background:#9cff00;
color:#000;
box-shadow:0 0 10px #9cff00;
}
</style>
</head>
