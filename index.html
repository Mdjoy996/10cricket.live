<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>10Cricket</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#000;
font-family:Arial;
color:#fff;
padding-bottom:120px;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
min-height:60px;
background:linear-gradient(90deg,#001a00,#00aa00,#001a00);
}

.logo{
display:flex;
align-items:center;
gap:6px;
}

.logo img{
height:55px;
}

/* AUTH */
.btns a{
padding:8px 12px;
margin-left:6px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
font-size:14px;
}

.signup{background:#111;color:#fff}
.login{background:#9cff00;color:#000}

/* SLIDER */
.slider-box{
margin-bottom:12px;
overflow:hidden;
border-radius:14px
}

.slider-img{
width:100%;
height:55px;
object-fit:cover
}

/* BANNER */
.wrap{padding:6px}

.banner{
margin-bottom:10px;
border:2px solid #66ff00;
border-radius:14px;
overflow:hidden;
box-shadow:0 0 10px #00ff00;
}

.banner img{
width:100%;
height:120px;
object-fit:cover;
}

/* SMALL */
.small{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
height:140px;
border:2px solid #66ff00;
border-radius:14px;
overflow:hidden;
background:#111;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* POPUP */
#gameBox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
z-index:999;
}

#gameFrame{
width:100%;
height:100%;
border:none
}

.closeBtn{
position:absolute;
top:10px;
right:10px;
background:red;
color:#fff;
padding:8px 12px;
border:none;
}

/* BET BAR */
#betBar{
display:none;
padding:10px;
background:#002b00;
}

#betBar .box{
display:flex;
gap:10px;
align-items:center;
}

.balanceBox{
flex:1;
background:#222;
padding:10px;
border-radius:10px;
}

.actionBtn{
background:#333;
padding:10px;
border-radius:10px;
cursor:pointer;
}

/* BOTTOM */
.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
padding:16px;
background:#001a00;
border-top:2px solid #66ff00;
}

.bottom a{
color:#fff;
font-size:22px;
text-decoration:none;
}

.home{color:#9cff00}

</style>
</head>

<body>

<header>

<div class="logo">
<img src="logo.png" id="siteLogo">
</div>

<div class="btns">
<a href="#" class="signup">Sign Up</a>
<a href="login.html" class="login">Login</a>
<a href="#" id="logoutBtn" class="login" style="display:none;" onclick="logout()">Logout</a>
</div>

</header>

<!-- BET BAR -->
<div id="betBar">
<div class="box">

<div class="balanceBox">
Main <span id="balance">0.00</span>  
&nbsp;&nbsp; Exposure <span id="exposure">0.00</span>
</div>

<div class="actionBtn" onclick="refreshBalance()">🔄</div>
<div class="actionBtn">⚙</div>

</div>
</div>

<div class="wrap">

<div class="slider-box">
<img class="slider-img" src="slider.png">
</div>

<div class="banner"><img src="banner1.png" onclick="openGame('https://example.com')"></div>
<div class="banner"><img src="banner2.png" onclick="openGame('https://example.com')"></div>
<div class="banner"><img src="banner3.png" onclick="openGame('https://example.com')"></div>
<div class="banner"><img src="banner4.png" onclick="openGame('https://example.com')"></div>

<div class="small">
<!-- তোমার সব small images এখানে থাকবে -->
</div>

</div>

<div class="banner">
<img src="bigbottom.png" style="height:80px;width:100%;object-fit:cover;">
</div>

<footer style="background:#0b0b0b;color:#fff;padding:25px 15px;text-align:center;">
<p>© 2026 10cricket.live</p>
</footer>

<div id="gameBox">
<button class="closeBtn" onclick="closeGame()">X</button>
<iframe id="gameFrame"></iframe>
</div>

<div class="bottom">
<a href="#">Sports</a>
<a href="#" class="home">Home</a>
<a href="#">Account</a>
</div>

<script>

function openGame(l){
document.getElementById("gameBox").style.display="block";
document.getElementById("gameFrame").src=l;
}

function closeGame(){
document.getElementById("gameBox").style.display="none";
document.getElementById("gameFrame").src="";
}

function refreshBalance(){
updateUI();
alert("Balance Updated 🔄");
}

/* LOGIN CONTROL */
function updateUI(){

let user = localStorage.getItem("currentUser");

let logo = document.getElementById("siteLogo");
let logout = document.getElementById("logoutBtn");
let betBar = document.getElementById("betBar");

let loginBtn = document.querySelector(".login");
let signupBtn = document.querySelector(".signup");

if(!user){
logo.style.display="block";
logout.style.display="none";
betBar.style.display="none";

loginBtn.style.display="inline-block";
signupBtn.style.display="inline-block";

return;
}

/* AFTER LOGIN */
logo.style.display="block";
logout.style.display="inline-block";
betBar.style.display="block";

loginBtn.style.display="none";
signupBtn.style.display="none";

/* BALANCE */
let users = JSON.parse(localStorage.getItem("users")) || [];
let u = users.find(x => x.username === user);

if(u){
document.getElementById("balance").innerText = u.balance || 0;
document.getElementById("exposure").innerText = u.exposure || 0;
}
}

function logout(){
localStorage.removeItem("currentUser");
location.reload();
}

window.onload = updateUI;

/* SLIDER */
let imgs = ["slider.png","slider1.png","slider2.png","slider3.png"];
let i = 0;

setInterval(() => {
i++;
if(i >= imgs.length){
i = 0;
}
document.querySelector(".slider-img").src = imgs[i];
}, 2000);

</script>

</body>
</html>
