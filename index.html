<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>10Cricket</title>

<style>

body{
background:#000;
font-family:Arial;
color:#fff;
margin:0;
padding-bottom:150px;
}

/* ================= BANNER + CARD ================= */
.banner, .card{
position:relative;
overflow:hidden;
cursor:pointer;
}

/* ▶ PLAY LABEL */
.banner::after,
.card::after{
content:"▶ Play";
position:absolute;
bottom:8px;
right:8px;
color:#00ff99;
font-size:12px;
font-weight:bold;
background:rgba(0,0,0,0.75);
padding:5px 10px;
border-radius:8px;
border:1px solid #00ff99;
z-index:10;
pointer-events:none;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px 10px;
background:linear-gradient(90deg,#001a00,#00aa00,#001a00);
}

.logo img{height:55px}

.btns a{
padding:8px 12px;
margin-left:6px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
font-size:14px;
}
.signup{background:#111;color:#fff}
.login{background:#9cff00;color:#000}

/* BET BAR */
#betBar{
display:none;
padding:4px 10px;
background:linear-gradient(90deg,#002b00,#006400,#002b00);
}

.betRow{
display:flex;
align-items:center;
gap:8px;
background:rgba(0,0,0,0.4);
padding:4px 6px;
border-radius:14px;
}

.betBox{
background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
padding:6px 12px;
border-radius:10px;
font-size:14px;
border:1px solid rgba(0,255,0,0.3);
}

.betMain{
flex:1;
background:linear-gradient(135deg,#111,#222);
padding:4px 10px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

#balanceVal{color:#00ff99;font-weight:bold;}
#exposureVal{color:#ff4d4d;font-weight:bold;}

/* ================= SLIDER ================= */
.slider-box{
margin:0;
padding:0;
overflow:hidden;
background:#000;
line-height:0;
}

.slider-img{
width:100%;
height:65px;
object-fit:cover;
display:block;
}

/* WRAP */
.wrap{padding:0;}

/* ================= TOP BANNERS ================= */
.banner{
margin:0;
border:2px solid rgba(0,255,153,0.7);
border-radius:10px;
overflow:hidden;
}

.banner img{
width:100%;
height:120px;
object-fit:cover;
display:block;
cursor:pointer;
}

/* ================= SMALL GRID ================= */
.small{
display:grid;
grid-template-columns:1fr 1fr;
gap:0;
position:relative;
}

/* 🔥 THICK CENTER LINE */
.small::before{
content:"";
position:absolute;
top:0;
left:50%;
width:5px;   /* 🔥 মোটা করা হয়েছে */
height:100%;
background:rgba(0,255,153,0.9);
}

/* CARD */
.card{
height:150px;
border-top:2px solid rgba(0,255,153,0.6);
border-bottom:2px solid rgba(0,255,153,0.6);
border-left:none;
border-right:none;
}

.card img{
width:110%;
height:100%;
object-fit:cover;
cursor:pointer;
}

/* GAME */
#gameBox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000;
display:none;
z-index:999;
}

#gameFrame{width:100%;height:100%;border:none}

.closeBtn{
position:absolute;
top:10px;right:10px;
background:red;
color:#fff;
padding:8px 12px;
border:none;
}

/* FOOTER */
footer{
background:#0b0b0b;
color:#fff;
padding:20px;
text-align:center;
font-size:12px;
opacity:0.8;
}

/* BOTTOM */
.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
padding:16px;
background:#001a00;
border-top:2px solid #66ff00;
}

.bottom a{
color:#fff;
font-size:22px;
text-decoration:none;
}
.home{color:#9cff00}

/* MOBILE */
@media (max-width:768px){

.banner{
border-left:none;
border-right:none;
border-radius:0;
}

.banner img{
height:130px;
}

.card{
height:150px;
}

}

</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.png" id="siteLogo">
</div>

<div class="btns">
<a href="#" class="signup">Sign Up</a>
<a href="login.html" class="login">Login</a>
</div>
</header>

<div id="betBar">
<div class="betRow">
<div class="betBox">💰 Bets</div>

<div class="betMain">
<span>Main <span id="balanceVal">0.00</span></span>
<span>Exposure <span id="exposureVal">0.00</span></span>
</div>

<div class="betBox">🔄</div>
<div class="betBox">⚙</div>
</div>
</div>

<div class="wrap">

<div class="slider-box">
<img class="slider-img" src="slider.png">
</div>

<!-- TOP BANNERS -->
<div class="banner"><img src="banner1.png"></div>
<div class="banner"><img src="banner2.png"></div>
<div class="banner"><img src="banner3.png"></div>
<div class="banner"><img src="banner4.png"></div>

<!-- SMALL GRID -->
<div class="small">
<script>
for(let i=1;i<=30;i++){
document.write('<div class="card"><img src="small'+i+'.png"></div>');
}
</script>
</div>

<!-- BOTTOM -->
<div class="banner">
<img src="bigbottom.png" style="height:80px;">
</div>

</div>

<footer>
10cricket.live | Online Sports Entertainment Platform<br>
© 2026 All Rights Reserved
</footer>

<div id="gameBox">
<button class="closeBtn" onclick="closeGame()">X</button>
<iframe id="gameFrame"></iframe>
</div>

<div class="bottom">
<a href="#">Sports</a>
<a href="#" class="home">Home</a>
<a href="#">Account</a>
</div>

<script>

function openGame(l){
document.getElementById("gameBox").style.display="block";
document.getElementById("gameFrame").src=l;
}

function closeGame(){
document.getElementById("gameBox").style.display="none";
document.getElementById("gameFrame").src="";
}

</script>

</body>
</html>
