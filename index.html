<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>10Cricket Premium Theme</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;background:linear-gradient(#001,#000);color:#fff}.header{display:flex;justify-content:space-between;align-items:center;padding:12px;background:linear-gradient(90deg,#020,#0a0)}.logo{font-size:34px;font-weight:900;color:#9f0}.actions a{padding:10px 16px;border-radius:10px;text-decoration:none;margin-left:8px;font-weight:bold}.signup{background:#111;color:#fff;border:2px solid #555}.login{background:#2a0;color:#fff}.section img{width:100%;display:block;border:1px solid #5f0;border-radius:8px;margin:6px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:6px}.box{background:#111;border:1px solid #5f0;border-radius:8px;padding:18px;text-align:center;font-weight:bold}.bottom{position:fixed;bottom:0;left:0;width:100%;display:flex;justify-content:space-around;align-items:center;background:#111;padding:10px 0}.home{background:#6f0;color:#000;padding:14px 22px;border-radius:18px;font-weight:bold}.space{height:80px}
</style></head><body>
<div class='header'><div class='logo'>10Cricket</div><div class='actions'><a class='signup' href='#'>SIGN UP</a><a class='login' href='#'>LOGIN</a></div></div>
<div class='section'>
<img src='banner1.png'>
<img src='banner2.png'>
<img src='banner3.png'>
<img src='banner4.png'>
</div>
<div class='grid'><div class='box'>GAMES</div><div class='box'>CRASH</div><div class='box'>SLOTS</div><div class='box'>LIVE CASINO</div></div>
<div class='space'></div>
<div class='bottom'><div>EXCH</div><div>IN-PLAY</div><div class='home'>HOME</div><div>SPORTS</div><div>ACCOUNT</div></div>
</body></html>
