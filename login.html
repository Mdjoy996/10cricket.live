<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(#0b2d0b,#49a000);
}

/* TOP IMAGE (CURVE FIXED) */
.top{
width:100%;
height:230px;
overflow:hidden;

/* 🔥 এইটা change করা হয়েছে */
border-bottom-left-radius:50% 120px;
border-bottom-right-radius:50% 120px;
}

.top img{
width:100%;
height:100%;
object-fit:cover;
}

/* FORM AREA */
.form{
padding:25px;

/* 🔥 নিচে নামানো */
margin-top:50px;

/* 🔥 ডানে চাপানো */
padding-left:40px;
padding-right:15px;
}

/* INPUT BOX */
.inputBox{
position:relative;
margin-bottom:18px;
}

.inputBox input{
width:100%;
padding:15px;
border-radius:15px;
border:none;
outline:none;
font-size:16px;
background:#eee;
}

/* EYE ICON */
.eye{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

/* BUTTON */
.btn{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#000;
color:#ffcc00;
font-size:18px;
margin-top:10px;
}

/* LINKS */
.links{
text-align:center;
margin-top:25px;
font-size:14px;
line-height:28px;
}

.links a{
color:#000;
text-decoration:underline;
}
</style>
</head>

<body>

<!-- TOP BANNER -->
<div class="top">
<img src="login-banner.png">
</div>

<!-- FORM -->
<div class="form">

<div class="inputBox">
<input type="text" placeholder="Username">
</div>

<div class="inputBox">
<input type="password" id="pass" placeholder="Password">
<span class="eye" onclick="togglePass()">👁</span>
</div>

<button class="btn">Login</button>

<div class="links">
<a href="#">Privacy Policy</a> |
<a href="#">Terms</a> |
<a href="#">Rules</a><br>

<a href="#">KYC</a> |
<a href="#">Responsible Gaming</a> |
<a href="#">About Us</a><br>

<a href="#">Self-exclusion Policy</a> |
<a href="#">Underage Policy</a>
</div>

</div>

<script>
function togglePass(){
var x=document.getElementById("pass");
x.type = x.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
