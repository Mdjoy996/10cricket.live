<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>

<style>
body{
margin:0;
background:linear-gradient(#0a1f0a,#66cc00);
font-family:Arial;
text-align:center;
}

.topimg{
width:100%;
height:220px;
object-fit:cover;
}

.form{
padding:20px;
margin-top:40px;
}

.inputBox{
position:relative;
width:90%;
margin:12px auto;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #555;
font-size:16px;
}

.eye{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

.validation{
display:flex;
justify-content:space-between;
align-items:center;
}

.code{
font-weight:bold;
font-size:22px;
}

.btn{
width:90%;
padding:14px;
background:linear-gradient(#111,#000);
color:#ffcc00;
border:none;
border-radius:10px;
font-size:18px;
margin-top:15px;
}

.footer{
margin-top:20px;
font-size:14px;
color:#111;
line-height:22px;
}
.footer a{
color:#111;
text-decoration:underline;
}
</style>

</head>

<body>

<img src="login-banner.png" class="topimg">

<div class="form">

<div class="inputBox">
<input type="text" id="user" placeholder="Username">
</div>

<div class="inputBox">
<input type="password" id="pass" placeholder="Password">
<span class="eye" onclick="togglePass()">👁</span>
</div>

<div class="inputBox validation">
<input type="text" id="val" placeholder="Validation">
<span class="code" id="code"></span>
</div>

<button class="btn" onclick="login()">Login</button>

<div class="footer">
<a href="#">Privacy Policy</a> |
<a href="#">Terms</a> |
<a href="#">Rules</a>
</div>

</div>

<script>
/* Password Show Hide */
function togglePass(){
var x = document.getElementById("pass");
x.type = (x.type === "password") ? "text" : "password";
}

/* Random Code */
var realCode = Math.floor(1000 + Math.random() * 9000);
document.getElementById("code").innerText = realCode;

/* LOGIN SYSTEM */
function login(){

var u = document.getElementById("user").value;
var p = document.getElementById("pass").value;
var v = document.getElementById("val").value;

/* CHANGE USERNAME PASSWORD HERE */
var USERNAME = "admin";
var PASSWORD = "1234";

if(u === USERNAME && p === PASSWORD){

if(v == realCode){
alert("Login Success ✅");

/* Save Login */
localStorage.setItem("login","ok");

/* Go Home */
window.location.href = "index.html";

}else{
alert("Wrong Validation ❌");
}

}else{
alert("Wrong Username or Password ❌");
}

}
</script>

</body>
</html>
