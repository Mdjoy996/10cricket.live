<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>10cricket.live Login</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(#062b06,#4caf00);
}

/* TOP BANNER */
.top{
width:100%;
height:340px;
overflow:hidden;
border-bottom-left-radius:20% 60px;
border-bottom-right-radius:20% 60px;
}

.top img{
width:100%;
height:100%;
object-fit:cover;
}

/* LOGIN FORM */
.form{
width:92%;
max-width:380px;
margin:90px auto 0 auto;
}

/* INPUT */
.inputBox{
margin-bottom:15px;
}

.inputBox input{
width:100%;
height:55px;
border-radius:15px;
border:none;
outline:none;
padding:0 15px;
font-size:16px;
background:#f2f2f2;
box-sizing:border-box;
}

/* PASSWORD */
.passwordBox{
position:relative;
}

.passwordBox input{
padding-right:45px;
}

.toggle{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:18px;
}

/* BUTTON */
.btn{
width:100%;
height:55px;
border:none;
border-radius:15px;
background:#000;
color:#ffcc00;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

/* LINKS */
.links{
text-align:center;
margin-top:10px;
font-size:14px;
}

.links a{
color:#000;
text-decoration:underline;
}

/* FOOTER */
.footer{
margin-top:20px;
background:#0b0b0b;
color:#fff;
padding:15px;
text-align:center;
}

.footer .copy{
margin-bottom:8px;
}

.support{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

.icon-box{
background:#111;
color:#00ff99;
padding:8px 10px;
border-radius:8px;
font-size:12px;
border:1px solid #00ff99;
}

/* DEMO ONLY (NO CLICK) */
.icon-box.demo{
pointer-events:none;
opacity:0.7;
}

/* hover only visual */
.icon-box:hover{
background:#111;
color:#00ff99;
}

/* bottom text */
.bottom-text{
text-align:center;
padding:15px;
font-size:12px;
color:#000;
}
</style>
</head>

<body>

<!-- TOP BANNER -->
<div class="top">
<img src="login-banner.png">
</div>

<!-- LOGIN FORM -->
<div class="form">

<form id="loginForm">

<div class="inputBox">
<input type="text" id="username" placeholder="Username" required>
</div>

<div class="inputBox passwordBox">
<input type="password" id="password" placeholder="Password" required>
<span class="toggle" onclick="togglePassword()">👁</span>
</div>

<button class="btn" type="submit">LOGIN</button>

</form>

<div class="links">
<a href="#">Forgot Password?</a>
</div>

</div>

<!-- FOOTER -->
<footer class="footer">

<div class="copy">10cricket.live | © 2026</div>

<div>
KYC | About Us | Privacy Policy | Responsible Gaming | Terms & Conditions
</div>

<div class="support">
<div class="icon-box demo">📱 WhatsApp 1</div>
<div class="icon-box demo">📱 WhatsApp 2</div>
<div class="icon-box demo">💬 IMO</div>
<div class="icon-box demo">🎮 Betfire</div>
</div>

</footer>

<div class="bottom-text">
All users must agree to our policies before using services.
</div>

<script>
function togglePassword(){
let password = document.getElementById("password");
password.type = (password.type === "password") ? "text" : "password";
}

document.getElementById("loginForm").addEventListener("submit", function(e){
e.preventDefault();

let user = document.getElementById("username").value;
let pass = document.getElementById("password").value;

if(user === "admin" && pass === "1234"){
localStorage.setItem("currentUser", user);
alert("Login Successful ✅");
window.location.href = "index.html";
} else {
alert("Wrong Username or Password ❌");
}
});
</script>

</body>
</html>
