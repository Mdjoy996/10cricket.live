<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(#062b06,#4caf00);
}

.top{
width:100%;
height:230px;
overflow:hidden;
border-bottom-left-radius:60% 100px;
border-bottom-right-radius:60% 100px;
}

.top img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.form{
width:92%;
max-width:380px;
margin:70px auto 0 auto;
}

.inputBox{
position:relative;
}

.inputBox input{
width:100%;
height:55px;
border-radius:15px;
border:none;
outline:none;
padding:0 15px;
font-size:16px;
background:#f2f2f2;
margin-bottom:15px;
box-sizing:border-box;
}

.btn{
width:100%;
height:55px;
border:none;
border-radius:15px;
background:#000;
color:#ffcc00;
font-size:18px;
font-weight:bold;
margin-top:5px;
cursor:pointer;
}

.links{
text-align:center;
margin-top:25px;
font-size:14px;
line-height:28px;
padding-bottom:40px;
}
</style>
</head>

<body>

<div class="top">
<img src="banner1.png">
</div>

<div class="form">

<form id="loginForm">

<div class="inputBox">
<input type="text" id="username" placeholder="Username">
</div>

<div class="inputBox">
<input type="password" id="password" placeholder="Password">
</div>

<button class="btn" type="submit">LOGIN</button>

</form>

<div class="links">
<a href="#">Forgot Password?</a>
</div>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
e.preventDefault();

let user = document.getElementById("username").value;
let pass = document.getElementById("password").value;

if(user === "admin" && pass === "1234"){
alert("Login Success");
} else {
alert("Wrong username or password");
}
});
</script>

</body>
</html>
