<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(#002800,#66cc00);
color:#000;
}

/* Top Image */
.top-img{
width:100%;
height:250px;
object-fit:cover;
}

/* Form Box */
.form-box{
width:90%;
max-width:400px;
margin:30px auto;
}

/* Input */
input{
width:100%;
padding:15px;
margin:10px 0;
border-radius:12px;
border:none;
font-size:16px;
}

/* Password eye */
.pass-box{
position:relative;
}
.eye{
position:absolute;
right:15px;
top:18px;
cursor:pointer;
}

/* Button */
.btn{
width:100%;
padding:15px;
background:#000;
color:#ffcc00;
border:none;
border-radius:12px;
font-size:18px;
margin-top:10px;
}

/* Footer Text */
.footer{
text-align:center;
margin-top:20px;
font-size:14px;
}
.footer a{
color:#000;
text-decoration:underline;
}
</style>

</head>

<body>

<!-- 🔴 IMPORTANT: image name same hote hobe -->
<img src="login-banner.png" class="top-img">

<div class="form-box">

<input type="text" placeholder="Username">

<div class="pass-box">
<input type="password" id="pass" placeholder="Password">
<span class="eye" onclick="togglePass()">👁️</span>
</div>

<button class="btn" onclick="login()">Login</button>

<div class="footer">
<a href="#">Privacy Policy</a> |
<a href="#">Terms & Conditions</a> |
<a href="#">Rules</a><br><br>

<a href="#">KYC</a> |
<a href="#">Responsible Gaming</a> |
<a href="#">About Us</a><br><br>

<a href="#">Self-exclusion Policy</a> |
<a href="#">Underage Policy</a>
</div>

</div>

<script>
function togglePass(){
let x = document.getElementById("pass");
if(x.type === "password"){
x.type = "text";
}else{
x.type = "password";
}
}

function login(){
alert("Login Button Clicked");
}
</script>

</body>
</html>
