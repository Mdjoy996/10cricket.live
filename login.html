<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(#0b2d0b,#49a000);
color:#fff;
}

/* TOP IMAGE */
.top{
width:100%;
height:230px;
overflow:hidden;
border-bottom-left-radius:50% 80px;
border-bottom-right-radius:50% 80px;
}

.top img{
width:100%;
height:100%;
object-fit:cover;
}

/* FORM */
.form{
padding:25px;
margin-top:20px;
}

/* INPUT BOX */
.inputBox{
position:relative;
margin-bottom:18px;
}

.inputBox input{
width:100%;
padding:15px;
border-radius:15px;
border:none;
outline:none;
font-size:16px;
background:#eee;
color:#000;
}

/* EYE ICON */
.eye{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:18px;
}

/* BUTTON */
.btn{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#000;
color:#ffcc00;
font-size:18px;
margin-top:10px;
}

/* LINKS */
.links{
text-align:center;
margin-top:25px;
font-size:14px;
line-height:28px;
}

.links a{
color:#000;
text-decoration:underline;
}
</style>
</head>

<body>

<!-- TOP BANNER -->
<div class="top">
<img src="login-banner.png">
</div>

<!-- FORM -->
<div class="form">

<div class="inputBox">
<input type="text" placeholder="Username">
</div>

<div class="inputBox">
<input type="password" id="pass" placeholder="Password">
<span class="eye" onclick="togglePass()">👁</span>
</div>

<button class="btn" onclick="login()">Login</button>

<div class="links">
<a href="#">Privacy Policy</a> |
<a href="#">Terms & Conditions</a> |
<a href="#">Rules</a><br>

<a href="#">KYC</a> |
<a href="#">Responsible Gaming</a> |
<a href="#">About Us</a><br>

<a href="#">Self-exclusion Policy</a> |
<a href="#">Underage Policy</a>
</div>

</div>

<script>
function togglePass(){
var x=document.getElementById("pass");
if(x.type==="password"){
x.type="text";
}else{
x.type="password";
}
}

function login(){
alert("Login system not connected yet");
}
</script>

</body>
</html>
