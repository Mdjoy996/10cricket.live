<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(#062b06,#4caf00);
}

/* TOP BANNER */
.top{
width:100%;
height:230px;
overflow:hidden;

/* smooth curve */
border-bottom-left-radius:60% 100px;
border-bottom-right-radius:60% 100px;
}

.top img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

/* FORM AREA */
.form{
width:92%;
max-width:380px;
margin:70px auto 0 auto; /* center perfect */
}

/* INPUT */
.inputBox{
position:relative;
}

.inputBox input{
width:100%;
height:55px;
border-radius:15px;
border:none;
outline:none;
padding:0 15px;
font-size:16px;
background:#f2f2f2;
margin-bottom:15px;
box-sizing:border-box;
}

/* EYE ICON */
.eye{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:18px;
}

/* LOGIN BUTTON */
.btn{
width:100%;
height:55px;
border:none;
border-radius:15px;
background:#000;
color:#ffcc00;
font-size:18px;
font-weight:bold;
margin-top:5px;
}

/* LINKS */
.links{
text-align:center;
margin-top:25px;
font-size:14px;
line-height:28px;
padding-bottom:40px;
}

.links a{
color:#000;
text-decoration:underline;
}
</style>
</head>

<body>

<!-- TOP IMAGE -->
<div class="top">
<img src="banner1.png">
</div>

<!-- FORM -->
<div class="form">

<div class="inputBox">
<input
